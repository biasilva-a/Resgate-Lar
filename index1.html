<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="left">
            <img src="imagens/logo1.png" alt="logo">
            <h2>Seja bem-vindo(a) ao</a><br> Resgate & Lar  </h2>
        </div>

        <div class="right">
            <div class="cadastro-box">
                <h1>CADASTRO</h1>

                <form id="form">
                    <input type="text" id="Nome" placeholder="Nome Completo" required>
                    <input type="email" id="Email" placeholder="E-mail" required>
                    <input type="password" id="Senha" placeholder="Senha" required>
                    <input type="password" id="Senha2" placeholder="Repita a senha" required>
                    <button type="submit">Cadastrar</button>
                </form>

                <p class="cadastro-text">Já tem cadastro?</p>
                <a href="index2.html" class="cadastro-link">Fazer login</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
